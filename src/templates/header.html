<header>
  <nav>
    <a href="/" class="logo">Bastien BYRA</a>
    <div class="search-wrapper" id="search-wrapper">
      <input type="search" id="search" class="search-input" placeholder="Rechercher&hellip;" autocomplete="off" spellcheck="false">
      <div class="search-results hidden" id="search-results"></div>
    </div>
    <div class="nav-links">
      <a href="/">Articles</a>
      <a href="/feed.xml" class="rss-link" aria-label="Flux RSS">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
          <circle cx="2" cy="14" r="2"/>
          <path d="M0 5.5A.5.5 0 0 1 .5 5c5.523 0 10 4.477 10 10a.5.5 0 0 1-1 0 9 9 0 0 0-9-9 .5.5 0 0 1-.5-.5z"/>
          <path d="M0 1.5A.5.5 0 0 1 .5 1C8.508 1 15 7.492 15 15.5a.5.5 0 0 1-1 0C14 8.044 7.956 2 .5 2a.5.5 0 0 1-.5-.5z"/>
        </svg>
      </a>
      <button class="theme-toggle" onclick="toggleTheme()" aria-label="Changer de th&egrave;me"></button>
    </div>
  </nav>
</header>
<script>
  function toggleTheme() {
    var next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('theme', next);
  }

  (function () {
    const input = document.getElementById('search');
    const resultsEl = document.getElementById('search-results');
    const prefix = window.location.pathname.startsWith('/articles/') ? '../' : './';
    const normalize = function(s) {
      return s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    };
    var index = null;

    function loadIndex() {
      if (index !== null) return Promise.resolve();
      return fetch(prefix + 'search.json')
        .then(function(r) { return r.json(); })
        .then(function(data) { index = data; })
        .catch(function() { index = []; });
    }

    function render(items) {
      if (items.length === 0) {
        resultsEl.innerHTML = '<p class="search-no-results">Aucun résultat.</p>';
      } else {
        resultsEl.innerHTML = items.slice(0, 8).map(function(item) {
          return '<a href="/' + item.url + '" class="search-result-item">'
            + '<span class="search-result-title">' + item.title + '</span>'
            + '<span class="search-result-desc">' + item.description + '</span>'
            + '</a>';
        }).join('');
      }
      resultsEl.classList.remove('hidden');
    }

    function hide() {
      resultsEl.classList.add('hidden');
    }

    input.addEventListener('input', function() {
      var q = normalize(input.value.trim());
      if (q.length < 3) { hide(); return; }
      loadIndex().then(function() {
        render(index.filter(function(item) {
          return normalize(item.title + ' ' + item.description + ' ' + item.tags).includes(q);
        }));
      });
    });

    document.addEventListener('click', function(e) {
      if (!e.target.closest('#search-wrapper')) hide();
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { hide(); input.value = ''; input.blur(); }
    });
  })();
</script>
