<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <script>
    (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog de Bastien</title>
  <meta name="description" content="Articles techniques sur le DevOps, le web et la sécurité.">
  <link rel="stylesheet" href="{{ blog__assets }}/style.css">
</head>
<body class="page-index">
  {{ blog__header_block }}

  <main>
    <div class="hero">
      <div class="hero-text">
        <h1 class="hero-title">Le blog<br>de <em>Bastien</em></h1>
        <p class="hero-sub">Un type lambda, <span class="hero-sub-note"> mais pas AWS, </span></p>
        <p class="hero-sub"><span class="hero-sub-sub-note"> vous l'avez.. ?</span></p>
      </div>
    </div>

    <section class="blog-index">
      <div class="blog-index-header">
        <span class="blog-index-label">Articles</span>
        <input type="search" id="search" class="search-input" placeholder="Rechercher&hellip;" autocomplete="off" spellcheck="false">
      </div>
      <div class="article-list">
        {{ blog__articles_block }}
      </div>
      <p class="search-empty hidden" id="search-empty">Aucun article trouv&eacute;.</p>
    </section>
  </main>

  {{ blog__footer_block }}

  <script>
    (function () {
      const input = document.getElementById('search')
      const cards = Array.from(document.querySelectorAll('.article-preview'))
      const empty = document.getElementById('search-empty')

      const normalize = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '')

      input.addEventListener('input', () => {
        const q = normalize(input.value.trim())
        let visible = 0
        cards.forEach(card => {
          const title = card.querySelector('h2').textContent
          const desc  = card.querySelector('p').textContent
          const tags  = card.querySelector('.tags').textContent
          const match = !q || normalize(title + ' ' + desc + ' ' + tags).includes(q)
          card.style.display = match ? '' : 'none'
          if (match) visible++
        })
        empty.classList.toggle('hidden', visible > 0 || !q)
      })
    })()
  </script>
</body>
</html>
